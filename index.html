<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dressmap — Map your ride</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garant:ital,wght@0,400;0,600;0,700;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --sand: #F5F0E8;
    --sand-dark: #EAE3D5;
    --arena-green: #2D5016;
    --arena-light: #4A7A28;
    --night: #1A2744;
    --night-light: #243660;
    --gold: #C9A84C;
    --gold-light: #E8C96A;
    --silver: #A8A9AD;
    --bronze: #CD7F32;
    --cream: #FBF8F2;
    --text: #1A1A2E;
    --muted: #6B7280;
    --border: #D4C9B0;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--night);
    color: var(--cream);
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* ── AUTH SCREEN ── */
  #auth-screen {
    position: fixed; inset: 0; z-index: 100;
    background: linear-gradient(135deg, var(--night) 0%, var(--night-light) 50%, #0D1B35 100%);
    display: flex; align-items: center; justify-content: center;
  }
  .auth-card {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(201,168,76,0.3);
    border-radius: 16px;
    padding: 48px 40px;
    width: 420px;
    max-width: 95vw;
    backdrop-filter: blur(12px);
  }
  .auth-logo {
    text-align: center;
    margin-bottom: 32px;
  }
  .auth-logo .horse-icon { font-size: 48px; margin-bottom: 8px; }
  .auth-logo h1 {
    font-family: 'Cormorant Garant', serif;
    font-size: 36px; font-weight: 700;
    color: var(--gold);
    letter-spacing: 1px;
  }
  .auth-logo p { color: var(--silver); font-size: 13px; margin-top: 4px; letter-spacing: 0.3px; }
  .auth-tabs { display: flex; gap: 4px; background: rgba(0,0,0,0.3); border-radius: 8px; padding: 4px; margin-bottom: 28px; }
  .auth-tab {
    flex: 1; padding: 8px; border: none; background: transparent; color: var(--silver);
    border-radius: 6px; cursor: pointer; font-size: 14px; font-family: 'Inter', sans-serif;
    transition: all 0.2s;
  }
  .auth-tab.active { background: var(--gold); color: var(--night); font-weight: 600; }
  .form-group { margin-bottom: 16px; }
  .form-group label { display: block; font-size: 12px; color: var(--silver); margin-bottom: 6px; letter-spacing: 0.5px; text-transform: uppercase; }
  .form-group input {
    width: 100%; padding: 12px 16px; border: 1px solid rgba(201,168,76,0.2);
    border-radius: 8px; background: rgba(255,255,255,0.06); color: var(--cream);
    font-size: 15px; font-family: 'Inter', sans-serif; transition: border 0.2s; outline: none;
  }
  .form-group input:focus { border-color: var(--gold); }
  .btn-primary {
    width: 100%; padding: 14px; background: linear-gradient(135deg, var(--gold), var(--gold-light));
    color: var(--night); border: none; border-radius: 8px; font-size: 15px; font-weight: 600;
    font-family: 'Inter', sans-serif; cursor: pointer; margin-top: 8px; transition: opacity 0.2s;
  }
  .btn-primary:hover { opacity: 0.9; }
  .auth-error { color: #FF6B6B; font-size: 13px; margin-top: 8px; text-align: center; min-height: 20px; }

  /* ── APP LAYOUT ── */
  #app { display: none; flex-direction: column; height: 100vh; }
  #app.visible { display: flex; }

  .topbar {
    display: flex; align-items: center; gap: 16px; padding: 0 16px;
    height: 52px; background: var(--night); border-bottom: 1px solid rgba(201,168,76,0.2);
    flex-shrink: 0;
  }
  .topbar-logo {
    font-family: 'Cormorant Garant', serif; font-size: 22px; font-weight: 700;
    color: var(--gold); white-space: nowrap; display: flex; align-items: center;
  }
  .topbar-logo span { font-size: 22px; }
  .topbar-sep { width: 1px; height: 28px; background: rgba(255,255,255,0.1); }

  .project-name-input {
    background: transparent; border: none; border-bottom: 1px solid rgba(201,168,76,0.3);
    color: var(--cream); font-size: 14px; font-family: 'Inter', sans-serif; padding: 2px 8px;
    width: 200px; outline: none;
  }
  .project-name-input:focus { border-bottom-color: var(--gold); }

  .topbar-actions { display: flex; gap: 8px; margin-left: auto; align-items: center; }
  .btn-sm {
    padding: 6px 14px; border-radius: 6px; font-size: 13px; font-weight: 500;
    font-family: 'Inter', sans-serif; cursor: pointer; transition: all 0.2s; border: none;
  }
  .btn-save { background: var(--gold); color: var(--night); }
  .btn-save:hover { background: var(--gold-light); }
  .btn-clear { background: rgba(255,255,255,0.08); color: var(--silver); border: 1px solid rgba(255,255,255,0.1); }
  .btn-clear:hover { background: rgba(255,255,255,0.14); color: var(--cream); }
  .btn-export { background: rgba(168,169,173,0.15); color: var(--silver); border: 1px solid rgba(168,169,173,0.3); }
  .btn-export:hover { background: rgba(168,169,173,0.25); }
  .btn-logout { background: transparent; color: var(--muted); border: 1px solid rgba(255,255,255,0.1); }
  .btn-logout:hover { color: #FF6B6B; border-color: #FF6B6B; }
  .user-badge { color: var(--silver); font-size: 13px; }

  .main { display: flex; flex: 1; overflow: hidden; }

  /* ── SIDEBAR ── */
  .sidebar {
    width: 240px; flex-shrink: 0; background: rgba(0,0,0,0.25);
    border-right: 1px solid rgba(255,255,255,0.07);
    display: flex; flex-direction: column; overflow-y: auto;
    padding-bottom: 16px;
  }
  .sidebar-section { padding: 14px 12px 6px; }
  .sidebar-section-title {
    font-size: 10px; font-weight: 600; letter-spacing: 1.2px; text-transform: uppercase;
    color: var(--muted); margin-bottom: 8px; padding-left: 4px;
  }
  .tool-btn {
    display: flex; align-items: center; gap: 10px; width: 100%; padding: 9px 12px;
    border: none; background: transparent; color: var(--cream); border-radius: 8px;
    font-size: 13px; font-family: 'Inter', sans-serif; cursor: pointer; text-align: left;
    transition: all 0.18s; margin-bottom: 2px;
  }
  .tool-btn:hover { background: rgba(255,255,255,0.08); }
  .tool-btn.active { background: rgba(201,168,76,0.15); color: var(--gold); border: 1px solid rgba(201,168,76,0.3); }
  .tool-icon { font-size: 16px; width: 22px; text-align: center; flex-shrink: 0; }
  .tool-label { flex: 1; line-height: 1.3; }
  .tool-sub { font-size: 11px; color: var(--muted); }

  .color-section { padding: 14px 12px 6px; }
  .color-title { font-size: 10px; font-weight: 600; letter-spacing: 1.2px; text-transform: uppercase; color: var(--muted); margin-bottom: 10px; padding-left: 4px; }
  .allure-btns { display: flex; flex-direction: column; gap: 6px; }
  .allure-btn {
    display: flex; align-items: center; gap: 10px; padding: 10px 12px;
    border-radius: 8px; border: 2px solid transparent; cursor: pointer;
    transition: all 0.2s; background: rgba(255,255,255,0.04);
  }
  .allure-btn:hover { background: rgba(255,255,255,0.08); }
  .allure-btn.active { border-color: currentColor; background: rgba(255,255,255,0.1); }
  .allure-dot { width: 16px; height: 16px; border-radius: 50%; flex-shrink: 0; }
  .allure-name { font-size: 13px; font-weight: 500; }
  .allure-sub { font-size: 11px; opacity: 0.7; }
  .allure-pas { color: var(--bronze); }
  .allure-trot { color: var(--silver); }
  .allure-galop { color: var(--gold); }
  .dot-bronze { background: var(--bronze); }
  .dot-silver { background: var(--silver); }
  .dot-gold { background: var(--gold); }

  .line-width-section { padding: 10px 12px; }
  .line-width-label { font-size: 10px; font-weight: 600; letter-spacing: 1.2px; text-transform: uppercase; color: var(--muted); margin-bottom: 8px; }
  .line-width-slider { width: 100%; accent-color: var(--gold); }

  /* ── CANVAS AREA ── */
  .canvas-area {
    flex: 1; display: flex; align-items: center; justify-content: center;
    background: #0F1B2D; position: relative; overflow: hidden;
  }
  #main-canvas { cursor: crosshair; touch-action: none; }

  /* ── FLOATING HINT ── */
  .hint-bar {
    position: absolute; bottom: 16px; left: 50%; transform: translateX(-50%);
    background: rgba(0,0,0,0.6); backdrop-filter: blur(8px);
    border: 1px solid rgba(255,255,255,0.12); border-radius: 20px;
    padding: 8px 20px; font-size: 12px; color: var(--silver);
    pointer-events: none; white-space: nowrap;
  }

  /* ── ZOOM BAR ── */
  .zoom-bar {
    position: absolute; bottom: 16px; right: 16px;
    display: flex; gap: 4px;
  }
  .zoom-btn {
    width: 32px; height: 32px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.15);
    background: rgba(0,0,0,0.5); color: var(--cream); font-size: 18px; cursor: pointer;
    display: flex; align-items: center; justify-content: center; font-family: monospace;
    transition: background 0.2s;
  }
  .zoom-btn:hover { background: rgba(255,255,255,0.1); }
  .zoom-label { display: flex; align-items: center; padding: 0 10px; font-size: 12px; color: var(--silver); background: rgba(0,0,0,0.4); border-radius: 8px; border: 1px solid rgba(255,255,255,0.1); }

  /* ── SAVED PROJECTS PANEL ── */
  .projects-panel {
    position: fixed; inset: 0; z-index: 50; background: rgba(0,0,0,0.7);
    display: none; align-items: center; justify-content: center;
  }
  .projects-panel.open { display: flex; }
  .projects-card {
    background: var(--night-light); border: 1px solid rgba(201,168,76,0.3);
    border-radius: 16px; padding: 32px; width: 540px; max-width: 95vw; max-height: 80vh;
    display: flex; flex-direction: column;
  }
  .projects-card h2 { font-family: 'Cormorant Garant', serif; font-size: 24px; color: var(--gold); margin-bottom: 20px; }
  .projects-list { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; }
  .project-item {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 16px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.08);
    background: rgba(255,255,255,0.04); cursor: pointer; transition: background 0.2s;
  }
  .project-item:hover { background: rgba(255,255,255,0.1); }
  .project-item-name { font-size: 15px; color: var(--cream); }
  .project-item-date { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .project-item-del { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 18px; padding: 4px 8px; border-radius: 4px; }
  .project-item-del:hover { color: #FF6B6B; background: rgba(255,0,0,0.1); }
  .projects-empty { color: var(--muted); font-size: 14px; text-align: center; padding: 32px; }
  .btn-close-panel { margin-top: 20px; padding: 10px; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.1); color: var(--cream); border-radius: 8px; cursor: pointer; font-family: 'Inter', sans-serif; font-size: 14px; }

  /* ── TOAST ── */
  .toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(20px);
    background: var(--gold); color: var(--night); padding: 10px 24px; border-radius: 20px;
    font-size: 14px; font-weight: 600; opacity: 0; transition: all 0.3s; pointer-events: none; z-index: 200;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 4px; }
</style>
</head>
<body>

<!-- ══════════════════ AUTH ══════════════════ -->
<div id="auth-screen">
  <div class="auth-card">
    <div class="auth-logo">
      <svg width="80" height="50" viewBox="0 0 320 120" xmlns="http://www.w3.org/2000/svg" style="margin-bottom:10px">
        <rect x="30" y="10" width="260" height="100" rx="3" fill="#1C3A14" stroke="#C9A84C" stroke-width="2.5"/>
        <line x1="30" y1="60" x2="290" y2="60" stroke="#C9A84C" stroke-width="0.8" stroke-dasharray="5 4" opacity="0.4"/>
        <line x1="160" y1="10" x2="160" y2="110" stroke="#C9A84C" stroke-width="0.8" stroke-dasharray="5 4" opacity="0.4"/>
        <line x1="30" y1="60" x2="18" y2="60" stroke="#C9A84C" stroke-width="2"/>
        <line x1="290" y1="60" x2="302" y2="60" stroke="#C9A84C" stroke-width="2"/>
        <line x1="160" y1="10" x2="160" y2="-2" stroke="#C9A84C" stroke-width="2"/>
        <line x1="160" y1="110" x2="160" y2="122" stroke="#C9A84C" stroke-width="2"/>
        <text x="10" y="65" text-anchor="middle" font-family="Georgia,serif" font-weight="700" fill="#C9A84C" font-size="16">A</text>
        <text x="314" y="65" text-anchor="middle" font-family="Georgia,serif" font-weight="700" fill="#C9A84C" font-size="16">C</text>
        <text x="160" y="8" text-anchor="middle" font-family="Georgia,serif" font-weight="700" fill="#C9A84C" font-size="16">E</text>
        <text x="160" y="120" text-anchor="middle" font-family="Georgia,serif" font-weight="700" fill="#C9A84C" font-size="16">B</text>
        <circle cx="160" cy="60" r="4" fill="#C9A84C" opacity="0.2"/>
        <circle cx="160" cy="60" r="2" fill="#C9A84C"/>
        <text x="160" y="54" text-anchor="middle" font-family="Georgia,serif" font-weight="700" fill="#C9A84C" font-size="10" opacity="0.8">X</text>
        <path d="M30,60 C30,22 105,22 105,60 C105,98 160,98 160,60 C160,22 215,22 215,60 C215,98 290,98 290,60" fill="none" stroke="#E8C96A" stroke-width="2.2" stroke-linecap="round" opacity="0.95"/>
      </svg>
      <h1>Dressmap</h1>
      <p>Map your ride · Tracez votre reprise</p>
    </div>
    <div class="auth-tabs">
      <button class="auth-tab active" onclick="switchTab('login')">Connexion</button>
      <button class="auth-tab" onclick="switchTab('register')">Créer un compte</button>
    </div>
    <div id="login-form">
      <div class="form-group">
        <label>Nom d'utilisateur</label>
        <input type="text" id="login-user" placeholder="votre pseudo" autocomplete="username">
      </div>
      <div class="form-group">
        <label>Mot de passe</label>
        <input type="password" id="login-pass" placeholder="••••••••" autocomplete="current-password">
      </div>
      <button class="btn-primary" onclick="doLogin()">Se connecter</button>
      <div class="auth-error" id="login-error"></div>
    </div>
    <div id="register-form" style="display:none">
      <div class="form-group">
        <label>Nom d'utilisateur</label>
        <input type="text" id="reg-user" placeholder="choisissez un pseudo" autocomplete="username">
      </div>
      <div class="form-group">
        <label>Mot de passe</label>
        <input type="password" id="reg-pass" placeholder="au moins 6 caractères" autocomplete="new-password">
      </div>
      <div class="form-group">
        <label>Confirmer le mot de passe</label>
        <input type="password" id="reg-pass2" placeholder="répétez le mot de passe" autocomplete="new-password">
      </div>
      <button class="btn-primary" onclick="doRegister()">Créer le compte</button>
      <div class="auth-error" id="reg-error"></div>
    </div>
  </div>
</div>

<!-- ══════════════════ APP ══════════════════ -->
<div id="app">
  <div class="topbar">
    <div class="topbar-logo">
      <svg width="28" height="18" viewBox="0 0 320 120" xmlns="http://www.w3.org/2000/svg" style="vertical-align:middle;margin-right:7px">
        <rect x="30" y="10" width="260" height="100" rx="3" fill="#1C3A14" stroke="#C9A84C" stroke-width="4"/>
        <line x1="30" y1="60" x2="290" y2="60" stroke="#C9A84C" stroke-width="2" stroke-dasharray="8 6" opacity="0.4"/>
        <line x1="160" y1="10" x2="160" y2="110" stroke="#C9A84C" stroke-width="2" stroke-dasharray="8 6" opacity="0.4"/>
        <circle cx="160" cy="60" r="7" fill="#C9A84C"/>
        <path d="M30,60 C30,22 105,22 105,60 C105,98 160,98 160,60 C160,22 215,22 215,60 C215,98 290,98 290,60" fill="none" stroke="#E8C96A" stroke-width="5" stroke-linecap="round" opacity="0.95"/>
      </svg>Dressmap
    </div>
    <div class="topbar-sep"></div>
    <input class="project-name-input" id="project-name" value="Ma reprise" placeholder="Nom de la reprise">
    <div class="topbar-actions">
      <span class="user-badge" id="user-badge">—</span>
      <button class="btn-sm btn-clear" onclick="openProjects()">📂 Mes reprises</button>
      <button class="btn-sm btn-clear" onclick="undoAction()">↩ Annuler</button>
      <button class="btn-sm btn-export" onclick="exportPNG()">⬇ Exporter PNG</button>
      <button class="btn-sm btn-save" onclick="saveProject()">💾 Sauvegarder</button>
      <button class="btn-sm btn-logout" onclick="doLogout()">Déconnexion</button>
    </div>
  </div>

  <div class="main">
    <div class="sidebar">

      <!-- ALLURES / COULEURS -->
      <div class="color-section">
        <div class="color-title">Allure & Couleur</div>
        <div class="allure-btns">
          <div class="allure-btn allure-pas active" id="allure-pas" onclick="setAllure('pas')">
            <div class="allure-dot dot-bronze"></div>
            <div>
              <div class="allure-name">Pas</div>
              <div class="allure-sub">Bronze</div>
            </div>
          </div>
          <div class="allure-btn allure-trot" id="allure-trot" onclick="setAllure('trot')">
            <div class="allure-dot dot-silver"></div>
            <div>
              <div class="allure-name">Trot</div>
              <div class="allure-sub">Argent</div>
            </div>
          </div>
          <div class="allure-btn allure-galop" id="allure-galop" onclick="setAllure('galop')">
            <div class="allure-dot dot-gold"></div>
            <div>
              <div class="allure-name">Galop</div>
              <div class="allure-sub">Or</div>
            </div>
          </div>
        </div>
      </div>

      <!-- ÉPAISSEUR -->
      <div class="line-width-section">
        <div class="line-width-label">Épaisseur du tracé</div>
        <input type="range" class="line-width-slider" id="line-width" min="1" max="8" value="3">
      </div>

      <!-- OUTILS LIBRES -->
      <div class="sidebar-section">
        <div class="sidebar-section-title">Dessin libre</div>
        <button class="tool-btn active" id="tool-draw" onclick="setTool('draw')">
          <span class="tool-icon">✏️</span>
          <span class="tool-label">Tracé libre<br><span class="tool-sub">Dessiner à main levée</span></span>
        </button>
        <button class="tool-btn" id="tool-line" onclick="setTool('line')">
          <span class="tool-icon">📏</span>
          <span class="tool-label">Ligne droite<br><span class="tool-sub">Cliquer-glisser</span></span>
        </button>
        <button class="tool-btn" id="tool-arrow" onclick="setTool('arrow')">
          <span class="tool-icon">➡️</span>
          <span class="tool-label">Flèche directionnelle</span>
        </button>
        <button class="tool-btn" id="tool-erase" onclick="setTool('erase')">
          <span class="tool-icon">🧹</span>
          <span class="tool-label">Effaceur</span>
        </button>
      </div>

      <!-- FIGURES -->
      <div class="sidebar-section">
        <div class="sidebar-section-title">Figures — cliquer pour placer</div>

        <button class="tool-btn" id="tool-c20" onclick="setTool('circle20')">
          <span class="tool-icon">⭕</span>
          <span class="tool-label">Cercle 20 m<br><span class="tool-sub">Grand cercle</span></span>
        </button>
        <button class="tool-btn" id="tool-c15" onclick="setTool('circle15')">
          <span class="tool-icon">⭕</span>
          <span class="tool-label">Cercle 15 m<br><span class="tool-sub">Cercle moyen</span></span>
        </button>
        <button class="tool-btn" id="tool-c10" onclick="setTool('circle10')">
          <span class="tool-icon">⭕</span>
          <span class="tool-label">Cercle 10 m<br><span class="tool-sub">Petit cercle</span></span>
        </button>
        <button class="tool-btn" id="tool-serp3" onclick="setTool('serp3')">
          <span class="tool-icon">〰️</span>
          <span class="tool-label">Serpentine 3 boucles<br><span class="tool-sub">3 demi-cercles</span></span>
        </button>
        <button class="tool-btn" id="tool-serp4" onclick="setTool('serp4')">
          <span class="tool-icon">〰️</span>
          <span class="tool-label">Serpentine 4 boucles<br><span class="tool-sub">4 demi-cercles</span></span>
        </button>
        <button class="tool-btn" id="tool-halfpass" onclick="setTool('halfpass')">
          <span class="tool-icon">↗️</span>
          <span class="tool-label">Appuyer / Deux pistes<br><span class="tool-sub">Ligne diagonale</span></span>
        </button>
        <button class="tool-btn" id="tool-volt" onclick="setTool('volt')">
          <span class="tool-icon">🔄</span>
          <span class="tool-label">Volte 6 m<br><span class="tool-sub">Petit cercle serré</span></span>
        </button>
        <button class="tool-btn" id="tool-diag" onclick="setTool('diag')">
          <span class="tool-icon">↘️</span>
          <span class="tool-label">Diagonale entière</span>
        </button>
        <button class="tool-btn" id="tool-demidiag" onclick="setTool('demidiag')">
          <span class="tool-icon">↙️</span>
          <span class="tool-label">Demi-diagonale</span>
        </button>

    <!-- CANVAS -->
    <div class="canvas-area" id="canvas-area">
      <canvas id="main-canvas"></canvas>
      <div class="hint-bar" id="hint-bar">✏️ Tracé libre actif — dessinez sur l'arène</div>
      <div class="zoom-bar">
        <button class="zoom-btn" onclick="zoomOut()">−</button>
        <div class="zoom-label" id="zoom-label">100%</div>
        <button class="zoom-btn" onclick="zoomIn()">+</button>

</div>

<script>
// ════════════════════════════════════════
//  AUTH
// ════════════════════════════════════════
let currentUser = null;

function getUsers() {
  return JSON.parse(localStorage.getItem('dressage_users') || '{}');
}
function saveUsers(u) { localStorage.setItem('dressage_users', JSON.stringify(u)); }

function switchTab(tab) {
  document.querySelectorAll('.auth-tab').forEach((t, i) => {
    t.classList.toggle('active', (tab === 'login') ? i === 0 : i === 1);
  });
  document.getElementById('login-form').style.display = tab === 'login' ? 'block' : 'none';
  document.getElementById('register-form').style.display = tab === 'register' ? 'block' : 'none';
  // Clear errors on tab switch
  document.getElementById('login-error').textContent = '';
  document.getElementById('reg-error').textContent = '';
}

function doLogin() {
  const u = document.getElementById('login-user').value.trim();
  const p = document.getElementById('login-pass').value;
  const err = document.getElementById('login-error');
  if (!u || !p) { err.textContent = 'Remplissez tous les champs.'; return; }
  const users = getUsers();
  if (!users[u] || users[u].password !== btoa(p)) { err.textContent = 'Identifiants incorrects.'; return; }
  err.textContent = '';
  loginSuccess(u);
}

function doRegister() {
  const u = document.getElementById('reg-user').value.trim();
  const p = document.getElementById('reg-pass').value;
  const p2 = document.getElementById('reg-pass2').value;
  const err = document.getElementById('reg-error');
  if (!u || !p) { err.textContent = 'Remplissez tous les champs.'; return; }
  if (p.length < 6) { err.textContent = 'Mot de passe trop court (6 caractères min).'; return; }
  if (p !== p2) { err.textContent = 'Les mots de passe ne correspondent pas.'; return; }
  const users = getUsers();
  if (users[u]) { err.textContent = 'Ce nom d\'utilisateur est déjà pris.'; return; }
  users[u] = { password: btoa(p), projects: {} };
  saveUsers(users);
  err.textContent = '';
  loginSuccess(u);
}

function loginSuccess(username) {
  currentUser = username;
  localStorage.setItem('dressage_session', username);
  document.getElementById('auth-screen').style.display = 'none';
  document.getElementById('app').classList.add('visible');
  document.getElementById('user-badge').textContent = '\u{1F464} ' + username;
  initApp();
}

function doLogout() {
  if (!confirm('Se déconnecter ?')) return;
  currentUser = null;
  localStorage.removeItem('dressage_session');
  document.getElementById('auth-screen').style.display = '';
  document.getElementById('app').classList.remove('visible');
  // Reset login form
  document.getElementById('login-user').value = '';
  document.getElementById('login-pass').value = '';
  document.getElementById('login-error').textContent = '';
  clearCanvas();
}

// keyboard enter on auth
document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !currentUser) {
    const loginVisible = document.getElementById('login-form').style.display !== 'none';
    if (loginVisible) doLogin();
    else doRegister();
  }
});

// ════════════════════════════════════════
//  CANVAS & APP
// ════════════════════════════════════════
const canvas = document.getElementById('main-canvas');
const ctx = canvas.getContext('2d');

// Arena dimensions (60m x 20m) – we scale to fit canvas
const ARENA_W_M = 60; // meters
const ARENA_H_M = 20;
const PADDING = 60; // px padding around arena

// Scale: how many px per meter
let scale = 1;
let arenaX = 0, arenaY = 0; // top-left of arena in canvas coords
let arenaW = 0, arenaH = 0;

let zoom = 1.0;
let panX = 0, panY = 0;

let currentTool = 'draw';
let currentAllure = 'pas';
let lineWidth = 3;

const allureColors = { pas: '#CD7F32', trot: '#A8A9AD', galop: '#C9A84C' };
function getCurrentColor() { return allureColors[currentAllure]; }

let history = [];
let historyIndex = -1;

let isDrawing = false;
let startX, startY, lastX, lastY;
let currentPath = [];

// For figure placement
let placingFigure = null;
let ghostX = 0, ghostY = 0;

function initApp() {
  resizeCanvas();
  drawAll();
}

function resizeCanvas() {
  const area = document.getElementById('canvas-area');
  canvas.width = area.clientWidth;
  canvas.height = area.clientHeight;
  computeArenaLayout();
  drawAll();
}
window.addEventListener('resize', resizeCanvas);

function computeArenaLayout() {
  const availW = canvas.width - PADDING * 2;
  const availH = canvas.height - PADDING * 2;
  const scaleW = availW / ARENA_W_M;
  const scaleH = availH / ARENA_H_M;
  scale = Math.min(scaleW, scaleH);
  arenaW = scale * ARENA_W_M;
  arenaH = scale * ARENA_H_M;
  arenaX = (canvas.width - arenaW) / 2;
  arenaY = (canvas.height - arenaH) / 2;
}

// Dressage letters positions on a 60x20 arena
// Letters: A C E B K H M F + interior X G D L I P R S V
const LETTERS = [
  // Short sides
  { l: 'A', x: 0,    y: 10,   side: 'left'   },
  { l: 'C', x: 60,   y: 10,   side: 'right'  },
  // Long sides (top = y=0, bottom = y=20)
  { l: 'K', x: 6,    y: 0,    side: 'top'    },
  { l: 'E', x: 30,   y: 0,    side: 'top'    },
  { l: 'H', x: 54,   y: 0,    side: 'top'    },
  { l: 'F', x: 6,    y: 20,   side: 'bottom' },
  { l: 'B', x: 30,   y: 20,   side: 'bottom' },
  { l: 'M', x: 54,   y: 20,   side: 'bottom' },
  // Interior (center line)
  { l: 'X', x: 30,   y: 10,   side: 'center' },
  { l: 'G', x: 54,   y: 10,   side: 'center' },
  { l: 'D', x: 6,    y: 10,   side: 'center' },
  { l: 'L', x: 18,   y: 10,   side: 'center' },
  { l: 'I', x: 42,   y: 10,   side: 'center' },
];

function mToC(mx, my) {
  // Convert arena meters to canvas px (before zoom/pan)
  return {
    x: arenaX + mx * scale,
    y: arenaY + my * scale
  };
}
function cToM(cx, cy) {
  return {
    x: (cx - arenaX) / scale,
    y: (cy - arenaY) / scale
  };
}

// ─── DRAW ───────────────────────────────
function drawAll() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.save();
  ctx.translate(panX, panY);
  ctx.scale(zoom, zoom);
  drawArena();
  // Draw history
  for (const item of history) {
    drawItem(item);
  }
  ctx.restore();
}

function drawArena() {
  // Background fill
  ctx.fillStyle = '#1C2E1A';
  ctx.beginPath();
  ctx.rect(arenaX, arenaY, arenaW, arenaH);
  ctx.fill();

  // Arena outline
  ctx.strokeStyle = '#FFFFFF';
  ctx.lineWidth = 2;
  ctx.strokeRect(arenaX, arenaY, arenaW, arenaH);

  // Center line (X axis)
  ctx.setLineDash([6, 4]);
  ctx.strokeStyle = 'rgba(255,255,255,0.2)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(arenaX, arenaY + arenaH / 2);
  ctx.lineTo(arenaX + arenaW, arenaY + arenaH / 2);
  ctx.stroke();
  // Center vertical
  ctx.beginPath();
  ctx.moveTo(arenaX + arenaW / 2, arenaY);
  ctx.lineTo(arenaX + arenaW / 2, arenaY + arenaH);
  ctx.stroke();
  ctx.setLineDash([]);

  // Quarter lines
  ctx.strokeStyle = 'rgba(255,255,255,0.08)';
  [0.25, 0.75].forEach(f => {
    ctx.beginPath();
    ctx.moveTo(arenaX + arenaW * f, arenaY);
    ctx.lineTo(arenaX + arenaW * f, arenaY + arenaH);
    ctx.stroke();
  });

  // Letters
  ctx.font = `bold ${Math.max(10, scale * 2.2)}px 'Cormorant Garant', serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  const OFF = scale * 2.2;

  for (const lt of LETTERS) {
    const p = mToC(lt.x, lt.y);
    let lx = p.x, ly = p.y;

    if (lt.side === 'center') {
      ctx.fillStyle = 'rgba(201,168,76,0.7)';
      // Small marker
      ctx.beginPath();
      ctx.arc(lx, ly, 3, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(201,168,76,0.4)';
      ctx.fill();
      ctx.fillStyle = 'rgba(201,168,76,0.9)';
      ctx.fillText(lt.l, lx, ly - OFF * 0.7);
    } else {
      if (lt.side === 'left')   lx -= OFF;
      if (lt.side === 'right')  lx += OFF;
      if (lt.side === 'top')    ly -= OFF;
      if (lt.side === 'bottom') ly += OFF;

      ctx.fillStyle = '#FFFFFF';
      // Small tick on arena border
      ctx.strokeStyle = 'rgba(255,255,255,0.6)';
      ctx.lineWidth = 1.5;
      const p2 = mToC(lt.x, lt.y);
      ctx.beginPath();
      if (lt.side === 'top' || lt.side === 'bottom') {
        ctx.moveTo(p2.x, p2.y);
        ctx.lineTo(p2.x, lt.side === 'top' ? p2.y - scale * 0.5 : p2.y + scale * 0.5);
      } else {
        ctx.moveTo(p2.x, p2.y);
        ctx.lineTo(lt.side === 'left' ? p2.x - scale * 0.5 : p2.x + scale * 0.5, p2.y);
      }
      ctx.stroke();
      ctx.fillText(lt.l, lx, ly);
    }
  }

  // Dimension labels
  ctx.font = `${Math.max(9, scale * 1.4)}px Inter, sans-serif`;
  ctx.fillStyle = 'rgba(168,169,173,0.5)';
  ctx.textAlign = 'center';
  ctx.fillText('60 m', arenaX + arenaW / 2, arenaY + arenaH + scale * 3.2);
  ctx.save();
  ctx.translate(arenaX - scale * 3.5, arenaY + arenaH / 2);
  ctx.rotate(-Math.PI / 2);
  ctx.fillText('20 m', 0, 0);
  ctx.restore();
}

function drawItem(item) {
  ctx.save();
  ctx.strokeStyle = item.color;
  ctx.fillStyle = item.color;
  ctx.lineWidth = item.lw;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';

  if (item.type === 'path') {
    if (item.points.length < 2) { ctx.restore(); return; }
    ctx.beginPath();
    ctx.moveTo(item.points[0].x, item.points[0].y);
    for (let i = 1; i < item.points.length; i++) ctx.lineTo(item.points[i].x, item.points[i].y);
    ctx.stroke();

  } else if (item.type === 'line') {
    ctx.beginPath();
    ctx.moveTo(item.x1, item.y1);
    ctx.lineTo(item.x2, item.y2);
    ctx.stroke();

  } else if (item.type === 'arrow') {
    drawArrow(item.x1, item.y1, item.x2, item.y2, item.lw, item.color);

  } else if (item.type === 'circle') {
    const cx = item.cx, cy = item.cy, r = item.r;
    ctx.beginPath();
    ctx.arc(cx, cy, r, 0, Math.PI * 2);
    ctx.stroke();

  } else if (item.type === 'serpentine') {
    drawSerpentine(item.cx, item.cy, item.loops, item.color, item.lw);

  } else if (item.type === 'diag') {
    ctx.beginPath();
    ctx.moveTo(item.x1, item.y1);
    ctx.lineTo(item.x2, item.y2);
    ctx.stroke();
    // arrowhead
    drawArrowHead(item.x1, item.y1, item.x2, item.y2, item.lw + 4, item.color);
  }
  ctx.restore();
}

function drawArrow(x1, y1, x2, y2, lw, color) {
  ctx.beginPath();
  ctx.moveTo(x1, y1);
  ctx.lineTo(x2, y2);
  ctx.stroke();
  drawArrowHead(x1, y1, x2, y2, lw + 4, color);
}

function drawArrowHead(x1, y1, x2, y2, size, color) {
  const angle = Math.atan2(y2 - y1, x2 - x1);
  const len = size * 2.5;
  ctx.save();
  ctx.fillStyle = color;
  ctx.beginPath();
  ctx.moveTo(x2, y2);
  ctx.lineTo(x2 - len * Math.cos(angle - 0.4), y2 - len * Math.sin(angle - 0.4));
  ctx.lineTo(x2 - len * Math.cos(angle + 0.4), y2 - len * Math.sin(angle + 0.4));
  ctx.closePath();
  ctx.fill();
  ctx.restore();
}

function drawSerpentine(cx, cy, loops, color, lw) {
  // Serpentine along the length of the arena centered at (cx, cy)
  const totalW = arenaW;
  const loopW = totalW / loops;
  const r = arenaH / 2; // radius = half width of arena

  ctx.beginPath();
  const steps = 80;
  let first = true;
  for (let i = 0; i <= loops * steps; i++) {
    const t = i / steps;
    const loopIndex = Math.floor(t);
    const f = t - loopIndex;
    const angle = f * Math.PI;
    const dir = loopIndex % 2 === 0 ? 1 : -1;

    const px = arenaX + (loopIndex + f) * loopW;
    const py = cy - dir * r * Math.sin(angle);
    if (first) { ctx.moveTo(px, py); first = false; }
    else ctx.lineTo(px, py);
  }
  ctx.stroke();
}

// ─── FIGURE GHOST ───────────────────────
function drawGhost(tool, mx, my) {
  const p = mToC(mx, my);
  ctx.save();
  ctx.globalAlpha = 0.5;
  ctx.strokeStyle = getCurrentColor();
  ctx.lineWidth = lineWidth;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
  ctx.setLineDash([5, 4]);

  if (tool === 'circle20') {
    const r = (20 / 2) * scale;
    ctx.beginPath(); ctx.arc(p.x, p.y, r, 0, Math.PI * 2); ctx.stroke();
  } else if (tool === 'circle15') {
    const r = (15 / 2) * scale;
    ctx.beginPath(); ctx.arc(p.x, p.y, r, 0, Math.PI * 2); ctx.stroke();
  } else if (tool === 'circle10') {
    const r = (10 / 2) * scale;
    ctx.beginPath(); ctx.arc(p.x, p.y, r, 0, Math.PI * 2); ctx.stroke();
  } else if (tool === 'volt') {
    const r = (6 / 2) * scale;
    ctx.beginPath(); ctx.arc(p.x, p.y, r, 0, Math.PI * 2); ctx.stroke();
  } else if (tool === 'serp3' || tool === 'serp4') {
    const loops = tool === 'serp3' ? 3 : 4;
    drawSerpentine(p.x, p.y, loops, getCurrentColor(), lineWidth);
  } else if (tool === 'halfpass') {
    const dx = arenaW * 0.3;
    ctx.beginPath();
    ctx.moveTo(p.x - dx/2, p.y - arenaH * 0.15);
    ctx.lineTo(p.x + dx/2, p.y + arenaH * 0.15);
    ctx.stroke();
    drawArrowHead(p.x - dx/2, p.y - arenaH*0.15, p.x + dx/2, p.y + arenaH*0.15, lineWidth+4, getCurrentColor());
  } else if (tool === 'diag') {
    ctx.beginPath();
    ctx.moveTo(arenaX, arenaY);
    ctx.lineTo(arenaX + arenaW, arenaY + arenaH);
    ctx.stroke();
  } else if (tool === 'demidiag') {
    ctx.beginPath();
    ctx.moveTo(arenaX, arenaY + arenaH);
    ctx.lineTo(arenaX + arenaW / 2, arenaY);
    ctx.stroke();
  }
  ctx.restore();
}

// ─── CANVAS EVENTS ──────────────────────
function getCanvasPos(e) {
  const rect = canvas.getBoundingClientRect();
  const clientX = e.touches ? e.touches[0].clientX : e.clientX;
  const clientY = e.touches ? e.touches[0].clientY : e.clientY;
  return {
    x: (clientX - rect.left - panX) / zoom,
    y: (clientY - rect.top  - panY) / zoom
  };
}

canvas.addEventListener('mousedown', onDown);
canvas.addEventListener('mousemove', onMove);
canvas.addEventListener('mouseup', onUp);
canvas.addEventListener('mouseleave', onUp);
canvas.addEventListener('touchstart', e => { e.preventDefault(); onDown(e); }, { passive: false });
canvas.addEventListener('touchmove',  e => { e.preventDefault(); onMove(e); }, { passive: false });
canvas.addEventListener('touchend',   e => { e.preventDefault(); onUp(e);   }, { passive: false });

function onDown(e) {
  const pos = getCanvasPos(e);

  if (currentTool === 'draw') {
    isDrawing = true;
    currentPath = [pos];
    lastX = pos.x; lastY = pos.y;

  } else if (currentTool === 'line' || currentTool === 'arrow') {
    isDrawing = true;
    startX = pos.x; startY = pos.y;

  } else if (currentTool === 'erase') {
    isDrawing = true;
    eraseAt(pos.x, pos.y);

  } else if (isFigureTool(currentTool)) {
    // Place figure at current mouse position
    placeFigureAt(currentTool, pos.x, pos.y);
  }
}

function onMove(e) {
  const pos = getCanvasPos(e);

  if (isFigureTool(currentTool)) {
    // Show ghost
    drawAll();
    ctx.save();
    ctx.translate(panX, panY);
    ctx.scale(zoom, zoom);
    const m = cToM(pos.x, pos.y);
    drawGhost(currentTool, m.x, m.y);
    ctx.restore();
    return;
  }

  if (!isDrawing) return;

  if (currentTool === 'draw') {
    currentPath.push(pos);
    // Draw incrementally
    ctx.save();
    ctx.translate(panX, panY); ctx.scale(zoom, zoom);
    ctx.strokeStyle = getCurrentColor();
    ctx.lineWidth = lineWidth;
    ctx.lineCap = 'round'; ctx.lineJoin = 'round';
    ctx.beginPath();
    ctx.moveTo(lastX, lastY);
    ctx.lineTo(pos.x, pos.y);
    ctx.stroke();
    ctx.restore();
    lastX = pos.x; lastY = pos.y;

  } else if (currentTool === 'line' || currentTool === 'arrow') {
    drawAll();
    ctx.save();
    ctx.translate(panX, panY); ctx.scale(zoom, zoom);
    ctx.strokeStyle = getCurrentColor();
    ctx.lineWidth = lineWidth;
    ctx.lineCap = 'round';
    ctx.setLineDash([6, 4]);
    ctx.beginPath();
    ctx.moveTo(startX, startY);
    ctx.lineTo(pos.x, pos.y);
    ctx.stroke();
    ctx.setLineDash([]);
    ctx.restore();

  } else if (currentTool === 'erase') {
    eraseAt(pos.x, pos.y);
  }
}

function onUp(e) {
  if (!isDrawing) return;
  isDrawing = false;

  const pos = e.changedTouches
    ? (() => { const r = canvas.getBoundingClientRect(); return { x: (e.changedTouches[0].clientX - r.left - panX)/zoom, y: (e.changedTouches[0].clientY - r.top - panY)/zoom }; })()
    : getCanvasPos(e);

  if (currentTool === 'draw' && currentPath.length > 1) {
    pushHistory({ type: 'path', points: [...currentPath], color: getCurrentColor(), lw: lineWidth });
  } else if ((currentTool === 'line') && (startX !== undefined)) {
    pushHistory({ type: 'line', x1: startX, y1: startY, x2: pos.x, y2: pos.y, color: getCurrentColor(), lw: lineWidth });
  } else if ((currentTool === 'arrow') && (startX !== undefined)) {
    pushHistory({ type: 'arrow', x1: startX, y1: startY, x2: pos.x, y2: pos.y, color: getCurrentColor(), lw: lineWidth });
  }
  currentPath = [];
  drawAll();
}

function eraseAt(cx, cy) {
  const r = 20;
  history = history.filter(item => {
    if (item.type === 'path') {
      return !item.points.some(p => dist(p.x, p.y, cx, cy) < r);
    }
    if (item.type === 'line' || item.type === 'arrow') {
      return distToSegment(cx, cy, item.x1, item.y1, item.x2, item.y2) > r;
    }
    if (item.type === 'circle') {
      return Math.abs(dist(item.cx, item.cy, cx, cy) - item.r) > r;
    }
    return true;
  });
  drawAll();
}

function dist(x1,y1,x2,y2) { return Math.sqrt((x2-x1)**2+(y2-y1)**2); }
function distToSegment(px, py, x1, y1, x2, y2) {
  const dx = x2 - x1, dy = y2 - y1;
  const t = Math.max(0, Math.min(1, ((px-x1)*dx + (py-y1)*dy) / (dx*dx + dy*dy)));
  return dist(px, py, x1 + t*dx, y1 + t*dy);
}

function isFigureTool(t) {
  return ['circle20','circle15','circle10','volt','serp3','serp4','halfpass','diag','demidiag'].includes(t);
}

function placeFigureAt(tool, cx, cy) {
  const color = getCurrentColor();
  const lw = lineWidth;

  if (tool === 'circle20') {
    pushHistory({ type: 'circle', cx, cy, r: (20/2)*scale, color, lw });
  } else if (tool === 'circle15') {
    pushHistory({ type: 'circle', cx, cy, r: (15/2)*scale, color, lw });
  } else if (tool === 'circle10') {
    pushHistory({ type: 'circle', cx, cy, r: (10/2)*scale, color, lw });
  } else if (tool === 'volt') {
    pushHistory({ type: 'circle', cx, cy, r: (6/2)*scale, color, lw });
  } else if (tool === 'serp3') {
    pushHistory({ type: 'serpentine', cx, cy, loops: 3, color, lw });
  } else if (tool === 'serp4') {
    pushHistory({ type: 'serpentine', cx, cy, loops: 4, color, lw });
  } else if (tool === 'halfpass') {
    const dx = arenaW * 0.3;
    pushHistory({ type: 'arrow', x1: cx - dx/2, y1: cy - arenaH*0.15, x2: cx + dx/2, y2: cy + arenaH*0.15, color, lw });
  } else if (tool === 'diag') {
    pushHistory({ type: 'diag', x1: arenaX, y1: arenaY, x2: arenaX + arenaW, y2: arenaY + arenaH, color, lw });
  } else if (tool === 'demidiag') {
    pushHistory({ type: 'diag', x1: arenaX, y1: arenaY + arenaH, x2: arenaX + arenaW / 2, y2: arenaY, color, lw });
  }
  drawAll();
}

// ─── HISTORY ────────────────────────────
function pushHistory(item) {
  // truncate redo
  history = history.slice(0, historyIndex + 1);
  history.push(item);
  historyIndex = history.length - 1;
}

function undoAction() {
  if (historyIndex < 0) { showToast('Rien à annuler'); return; }
  historyIndex--;
  history = history.slice(0, historyIndex + 1);
  drawAll();
}

function clearCanvas() {
  history = [];
  historyIndex = -1;
  drawAll();
}

// ─── TOOLS ──────────────────────────────
function setTool(tool) {
  currentTool = tool;
  document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active'));
  const map = { draw:'tool-draw', line:'tool-line', arrow:'tool-arrow', erase:'tool-erase',
    circle20:'tool-c20', circle15:'tool-c15', circle10:'tool-c10',
    serp3:'tool-serp3', serp4:'tool-serp4', halfpass:'tool-halfpass',
    volt:'tool-volt', diag:'tool-diag', demidiag:'tool-demidiag' };
  if (map[tool]) document.getElementById(map[tool]).classList.add('active');

  const hints = {
    draw: '✏️ Tracé libre — dessinez sur l\'arène',
    line: '📏 Ligne droite — cliquer-glisser pour tracer',
    arrow: '➡️ Flèche — cliquer-glisser pour définir la direction',
    erase: '🧹 Effaceur actif — passez sur les tracés pour les supprimer',
    circle20: '⭕ Cercle 20m — cliquez pour le placer',
    circle15: '⭕ Cercle 15m — cliquez pour le placer',
    circle10: '⭕ Cercle 10m — cliquez pour le placer',
    volt: '🔄 Volte 6m — cliquez pour placer',
    serp3: '〰️ Serpentine 3 boucles — cliquez pour placer',
    serp4: '〰️ Serpentine 4 boucles — cliquez pour placer',
    halfpass: '↗️ Appuyer / Deux pistes — cliquez pour placer',
    diag: '↘️ Diagonale entière — cliquez pour tracer',
    demidiag: '↙️ Demi-diagonale — cliquez pour tracer',
  };
  document.getElementById('hint-bar').textContent = hints[tool] || '';
}

function setAllure(allure) {
  currentAllure = allure;
  document.querySelectorAll('.allure-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('allure-' + allure).classList.add('active');
}

document.getElementById('line-width').addEventListener('input', e => {
  lineWidth = parseInt(e.target.value);
});

// ─── ZOOM / PAN ─────────────────────────
function zoomIn()  { zoom = Math.min(zoom * 1.25, 4); updateZoom(); }
function zoomOut() { zoom = Math.max(zoom / 1.25, 0.3); updateZoom(); }
function zoomReset() { zoom = 1; panX = 0; panY = 0; updateZoom(); }
function updateZoom() {
  document.getElementById('zoom-label').textContent = Math.round(zoom * 100) + '%';
  drawAll();
}

canvas.addEventListener('wheel', e => {
  e.preventDefault();
  const delta = e.deltaY > 0 ? 0.9 : 1.1;
  zoom = Math.min(Math.max(zoom * delta, 0.3), 4);
  updateZoom();
}, { passive: false });

// ─── SAVE / LOAD ────────────────────────
function getUserData() {
  const users = getUsers();
  return users[currentUser] || { password: '', projects: {} };
}
function setUserData(data) {
  const users = getUsers();
  users[currentUser] = data;
  saveUsers(users);
}

function saveProject() {
  const name = document.getElementById('project-name').value.trim() || 'Ma reprise';
  const data = getUserData();
  data.projects = data.projects || {};
  data.projects[name] = {
    history: JSON.stringify(history),
    historyIndex,
    savedAt: new Date().toISOString()
  };
  setUserData(data);
  showToast('✅ Reprise sauvegardée !');
}

function openProjects() {
  const data = getUserData();
  const projects = data.projects || {};
  const list = document.getElementById('projects-list');
  list.innerHTML = '';
  const keys = Object.keys(projects);
  if (keys.length === 0) {
    list.innerHTML = '<div class="projects-empty">Aucune reprise sauvegardée.<br>Commencez à dessiner et sauvegardez !</div>';
  } else {
    keys.forEach(name => {
      const p = projects[name];
      const date = new Date(p.savedAt).toLocaleDateString('fr-FR', { day: '2-digit', month: 'long', year: 'numeric', hour: '2-digit', minute: '2-digit' });
      const item = document.createElement('div');
      item.className = 'project-item';
      item.innerHTML = `
        <div style="flex:1" onclick="loadProject('${name.replace(/'/g,"\\'")}')">
          <div class="project-item-name">🏇 ${name}</div>
          <div class="project-item-date">Sauvegardé le ${date}</div>
        </div>
        <button class="project-item-del" onclick="deleteProject('${name.replace(/'/g,"\\'")}')">🗑</button>
      `;
      list.appendChild(item);
    });
  }
  document.getElementById('projects-panel').classList.add('open');
}

function closeProjects() {
  document.getElementById('projects-panel').classList.remove('open');
}

function loadProject(name) {
  const data = getUserData();
  const p = data.projects[name];
  if (!p) return;
  history = JSON.parse(p.history);
  historyIndex = p.historyIndex;
  document.getElementById('project-name').value = name;
  closeProjects();
  drawAll();
  showToast('📂 Reprise chargée : ' + name);
}

function deleteProject(name) {
  if (!confirm('Supprimer la reprise "' + name + '" ?')) return;
  const data = getUserData();
  delete data.projects[name];
  setUserData(data);
  openProjects();
  showToast('🗑 Reprise supprimée');
}

// ─── EXPORT PNG ─────────────────────────
function exportPNG() {
  // Draw to offscreen at 2x
  const offscreen = document.createElement('canvas');
  const scale2 = 2;
  offscreen.width = canvas.width * scale2;
  offscreen.height = canvas.height * scale2;
  const ctx2 = offscreen.getContext('2d');
  ctx2.scale(scale2, scale2);
  ctx2.clearRect(0, 0, canvas.width, canvas.height);
  // copy current canvas state
  ctx2.drawImage(canvas, 0, 0);

  const link = document.createElement('a');
  link.download = 'dressmap-' + (document.getElementById('project-name').value || 'reprise') + '.png';
  link.href = offscreen.toDataURL('image/png');
  link.click();
  showToast('🖼 Export PNG téléchargé !');
}

// ─── TOAST ──────────────────────────────
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// ─── KEYBOARD SHORTCUTS ─────────────────
document.addEventListener('keydown', e => {
  if (!currentUser) return;
  if (e.ctrlKey && e.key === 'z') { e.preventDefault(); undoAction(); }
  if (e.ctrlKey && e.key === 's') { e.preventDefault(); saveProject(); }
  if (e.key === 'd') setTool('draw');
  if (e.key === 'l') setTool('line');
  if (e.key === 'a') setTool('arrow');
  if (e.key === 'e') setTool('erase');
});

// ════════════════════════════════════════
//  SESSION & INIT
// ════════════════════════════════════════
window.addEventListener('load', () => {
  const saved = localStorage.getItem('dressage_session');
  if (saved) {
    const users = getUsers();
    if (users[saved]) {
      currentUser = saved;
      document.getElementById('auth-screen').style.display = 'none';
      document.getElementById('app').classList.add('visible');
      document.getElementById('user-badge').textContent = '\u{1F464} ' + currentUser;
      initApp();
    } else {
      localStorage.removeItem('dressage_session');
    }
  }
});
</script>
